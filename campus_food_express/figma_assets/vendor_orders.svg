<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Gradients & Shadows) -->
  <defs>
    <!-- Midnight Navy Gradient Header (Option B) -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="390" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Card/Panel Shadow -->
    <filter id="panelShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 1. VENDOR HEADER CARD -->
  <path d="M0 0H390V210C390 230 370 248 348 248H42C20 248 0 230 0 210V0Z" fill="url(#headerGrad)"/>

  <!-- Status Bar placeholder -->
  <text x="32" y="38" fill="#FFFFFF" fill-opacity="0.6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#FFFFFF" fill-opacity="0.6">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- Stall Name Title -->
  <text x="32" y="86" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.5">Maria's Homestyle Meals</text>

  <!-- Verified Badge Chip -->
  <rect x="32" y="98" width="112" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <!-- Verified Badge Star Icon -->
  <g transform="translate(42, 102)" fill="#10B981">
    <path d="M6 1L7.2 4.5H11L8.2 6.5L9.2 10L6 8L2.8 10L3.8 6.5L1 4.5H4.8L6 1Z"/>
  </g>
  <text x="56" y="113" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800">Active Authority</text>

  <!-- Logout Button on header right -->
  <circle cx="342" cy="92" r="18" fill="#FFFFFF" fill-opacity="0.08"/>
  <path d="M336 92h8m-3-3l3 3-3 3" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M339 87h-3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h3" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 2. FLOATING METRICS PANEL -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="148" width="326" height="154" rx="24" fill="#1E2E38" fill-opacity="0.95" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1.5"/>
  </g>

  <!-- Today's Sales label and Value -->
  <text x="52" y="180" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Today's Sales:</text>
  <text x="52" y="218" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="-1.0">₱4,745</text>

  <!-- Active Orders label and Green Box Count -->
  <text x="338" y="180" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="end">Active Orders:</text>
  <rect x="290" y="190" width="48" height="36" rx="10" fill="#10B981"/>
  <text x="314" y="213" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" text-anchor="middle">3</text>

  <!-- "OPEN FOR ORDERS" Switch status pill -->
  <rect x="52" y="238" width="220" height="42" rx="21" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="148" y="263" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="0.5" text-anchor="middle">OPEN FOR ORDERS</text>
  <circle cx="218" cy="259" r="4.5" fill="#10B981"/>

  <!-- Settings Gear Button -->
  <rect x="286" y="238" width="42" height="42" rx="12" fill="#2E3E4F"/>
  <!-- Gear Icon -->
  <g transform="translate(297, 249)" fill="#FFFFFF">
    <path d="M10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm-7.6 1.7a1 1 0 0 1 1-1h1.2a1 1 0 0 1 1 1c.2.6.5 1.1.9 1.6a1 1 0 0 1 0 1.2l-.8.8a1 1 0 0 1-1.4 0l-1.2-1.2a1 1 0 0 1 0-1.4zm15.2 2.6a1 1 0 0 1 0 1.4l-.8.8a1 1 0 0 1-1.4 0l-1.2-1.2a1 1 0 0 1 0-1.4c.2-.6.5-1.1.9-1.6a1 1 0 0 1 1 0h1.2a1 1 0 0 1 1 1v1z"/>
  </g>

  <!-- 3. ORDERS LIST TABS -->
  <!-- Tab selections row -->
  <g transform="translate(32, 322)">
    <rect x="0" y="0" width="326" height="38" rx="19" fill="#F1F5F9"/>
    
    <!-- Active Tab: Pending -->
    <rect x="2" y="2" width="78" height="34" rx="17" fill="#5562EA"/>
    <text x="41" y="23" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="900" text-anchor="middle">Pending</text>

    <!-- Tab 2: Preparing -->
    <text x="122" y="23" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" text-anchor="middle">Preparing</text>

    <!-- Tab 3: Ready -->
    <text x="208" y="23" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" text-anchor="middle">Ready</text>

    <!-- Tab 4: History -->
    <text x="286" y="23" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" text-anchor="middle">History</text>
  </g>

  <!-- 4. PENDING ORDERS LIST -->
  <!-- Pending Order Card 1 -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="380" width="326" height="154" rx="24" fill="#FFFFFF"/>
  </g>
  <text x="50" y="412" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900">Jhonford Deguzman</text>
  <text x="340" y="412" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900" text-anchor="end">₱99.75</text>
  <text x="50" y="432" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">ORDER ID: CFE-88910</text>
  <text x="340" y="432" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="end">ASAP Pickup</text>
  
  <!-- Line divider -->
  <line x1="50" y1="448" x2="340" y2="448" stroke="#F1F5F9" stroke-width="1.5"/>
  <text x="50" y="470" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">1x Chicken Adobo Rice Meal</text>

  <!-- Buttons: Decline & Accept -->
  <rect x="50" y="488" width="134" height="34" rx="10" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1"/>
  <text x="117" y="509" fill="#E11D48" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="900" text-anchor="middle">Decline</text>

  <rect x="196" y="488" width="144" height="34" rx="10" fill="#10B981"/>
  <text x="268" y="509" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="900" text-anchor="middle">Accept Order</text>


  <!-- Pending Order Card 2 -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="550" width="326" height="154" rx="24" fill="#FFFFFF"/>
  </g>
  <text x="50" y="582" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900">Alice Smith</text>
  <text x="340" y="582" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900" text-anchor="end">₱110.00</text>
  <text x="50" y="602" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">ORDER ID: CFE-88911</text>
  <text x="340" y="602" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="end">12:30 PM Pickup</text>
  
  <line x1="50" y1="618" x2="340" y2="618" stroke="#F1F5F9" stroke-width="1.5"/>
  <text x="50" y="640" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">1x Pork Sinigang Soup</text>

  <rect x="50" y="658" width="134" height="34" rx="10" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1"/>
  <text x="117" y="679" fill="#E11D48" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="900" text-anchor="middle">Decline</text>

  <rect x="196" y="658" width="144" height="34" rx="10" fill="#10B981"/>
  <text x="268" y="679" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="900" text-anchor="middle">Accept Order</text>


  <!-- 5. BOTTOM NAVIGATION BAR (Orders Highlighted in purple, Menu, Analytics) -->
  <path d="M0 754H390V844H0V754Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Tab 1: Orders (Selected Active Purple Pill) -->
  <g transform="translate(32, 768)">
    <rect x="0" y="0" width="102" height="38" rx="19" fill="#5562EA"/>
    <!-- Orders Icon -->
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" fill="#FFFFFF" transform="translate(12, 6) Scale(0.9)"/>
    <text x="66" y="24" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900">Orders</text>
  </g>

  <!-- Tab 2: Menu (grey utensils) -->
  <g transform="translate(180, 776)" fill="#94A3B8">
    <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V19h2.5v-7.03C11.34 11.84 13 10.12 13 8V2h-2v7zm4-3v5h1.5v8h2v-8H20V2c-2.76 0-5 2.24-5 4z"/>
  </g>

  <!-- Tab 3: Analytics (grey bar chart) -->
  <g transform="translate(296, 776)" fill="#94A3B8">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
  </g>
</svg>
