<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="390" height="844" rx="40" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="3"/>

  <!-- Top Status Bar -->
  <text x="32" y="32" fill="#0F172A" font-family="System-UI, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="-0.2">9:41</text>
  <path d="M328 22H338C339.105 22 340 22.8954 340 24V30C340 31.1046 339.105 32 338 32H328C326.895 32 326 31.1046 326 30V24C326 22.8954 326.895 22 328 22Z" stroke="#0F172A" stroke-width="1.5"/>
  <rect x="328" y="24" width="8" height="6" rx="1" fill="#0F172A"/>

  <!-- Header -->
  <g transform="translate(24, 55)">
    <!-- Back arrow links to cart.svg -->
    <a href="cart.svg" style="cursor: pointer;">
      <path d="M0 16H16M0 16L6 10M0 16L6 22" stroke="#1A365D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </a>
    <text x="32" y="22" fill="#1A365D" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="900">Checkout</text>
  </g>

  <!-- Toggle: Delivery / Pickup -->
  <g transform="translate(24, 110)">
    <rect width="342" height="50" rx="16" fill="#F1F5F9"/>
    
    <!-- Tab 1: Delivery (Active Dark Blue) -->
    <rect width="171" height="50" rx="16" fill="#1A365D"/>
    <text x="85" y="30" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="13" font-weight="800">Delivery</text>

    <!-- Tab 2: Pickup -->
    <text x="256" y="30" text-anchor="middle" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="700">Pickup</text>
  </g>

  <!-- Delivery details card -->
  <g transform="translate(24, 180)">
    <rect width="342" height="136" rx="24" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
    
    <g transform="translate(18, 18)">
      <text x="0" y="18" fill="#1A365D" font-family="'Inter', sans-serif" font-size="12" font-weight="900" letter-spacing="0.5">DELIVERY LOCATION</text>
      <!-- Location info -->
      <text x="0" y="44" fill="#0F172A" font-family="'Inter', sans-serif" font-size="15" font-weight="800">College of Engineering (COE)</text>
      <text x="0" y="64" fill="#7D8B9B" font-family="'Inter', sans-serif" font-size="13" font-weight="500">2nd Floor Corridor - Room 207</text>
      <text x="0" y="80" fill="#7D8B9B" font-family="'Inter', sans-serif" font-size="12" font-weight="400">Note: Leave at table near entrance</text>
      
      <!-- Edit location button -->
      <g transform="translate(270, 0)">
        <circle cx="16" cy="16" r="16" fill="#EFF6FF"/>
        <path d="M11 16L14 19L21 12" stroke="#1A365D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- Payment Method section -->
  <g transform="translate(24, 340)">
    <text x="0" y="16" fill="#1A365D" font-family="'Inter', sans-serif" font-size="14" font-weight="900" letter-spacing="0.5">PAYMENT METHOD</text>

    <!-- Payment Option 1: GCash (Active Colored Blue) -->
    <g transform="translate(0, 32)">
      <rect width="342" height="66" rx="20" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
      
      <!-- Checkbox (Active) -->
      <circle cx="34" cy="33" r="10" fill="#3B82F6"/>
      <circle cx="34" cy="33" r="5" fill="#FFFFFF"/>
      
      <!-- GCash Logo mockup -->
      <rect x="68" y="18" width="50" height="30" rx="6" fill="#007DFE"/>
      <text x="93" y="38" text-anchor="middle" fill="#FFFFFF" font-family="'Outfit', sans-serif" font-size="12" font-weight="900">G</text>
      
      <text x="134" y="38" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="800">GCash Mobile Wallet</text>
    </g>

    <!-- Payment Option 2: Cash on Delivery -->
    <g transform="translate(0, 114)">
      <rect width="342" height="66" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
      <circle cx="34" cy="33" r="10" stroke="#CBD5E1" stroke-width="2" fill="none"/>
      
      <!-- COD Icon mockup -->
      <rect x="68" y="18" width="50" height="30" rx="6" fill="#ECFDF5"/>
      <path d="M80 33H96M88 25V41" stroke="#10B981" stroke-width="2"/>
      
      <text x="134" y="38" fill="#64748B" font-family="'Inter', sans-serif" font-size="14" font-weight="700">Cash on Delivery (COD)</text>
    </g>
  </g>

  <!-- Button: PLACE ORDER (Links to checkout_success_toast.svg) -->
  <a href="checkout_success_toast.svg" style="cursor: pointer;">
    <g transform="translate(24, 574)">
      <rect width="342" height="54" rx="16" fill="#1A365D"/>
      <text x="171" y="32" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="15" font-weight="800" letter-spacing="-0.2">PLACE ORDER (₱235.25)</text>
    </g>
  </a>
</svg>
