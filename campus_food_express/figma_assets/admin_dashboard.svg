<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Gradients & Shadows) -->
  <defs>
    <!-- Crimson Red Gradient Header -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="390" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#EF4444" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- 1. ADMIN HEADER SECTION (CRIMSON RED GRADIENT) -->
  <path d="M0 0H390V160C390 173.255 379.255 184 366 184H24C10.7452 184 0 173.255 0 160V0Z" fill="url(#headerGrad)"/>

  <!-- Status Bar placeholder (Standard iOS-style) -->
  <text x="32" y="38" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#FFFFFF">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- Admin Panel Shield Badge -->
  <circle cx="50" cy="106" r="22" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Shield Icon -->
  <path d="M50 96L42 99V105C42 110.2 45.4 115.1 50 116.3C54.6 115.1 58 110.2 58 105V99L50 96Z" fill="#FFFFFF"/>
  <path d="M50 100.5V111.5" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <path d="M46.5 104H53.5" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>

  <!-- Console Title & Label -->
  <text x="86" y="103" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" letter-spacing="-0.5">Admin Console</text>
  <text x="86" y="119" fill="#FFFFFF" fill-opacity="0.75" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">PLATFORM MANAGER</text>

  <!-- Total Stalls Active Indicator Pill -->
  <rect x="290" y="93" width="76" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.15"/>
  <text x="328" y="110" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="900" text-anchor="middle">ACTIVE MODE</text>


  <!-- 2. HORIZONTAL TAB SELECTOR SECTION -->
  <rect x="24" y="204" width="342" height="46" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- "Approvals" Selected -->
  <rect x="28" y="208" width="106" height="38" rx="11" fill="#EF4444" fill-opacity="0.08"/>
  <text x="81" y="232" fill="#EF4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" text-anchor="middle">Approvals</text>
  
  <!-- "Vendors" -->
  <text x="195" y="232" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Vendors List</text>
  
  <!-- "Revenue" -->
  <text x="310" y="232" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Revenue</text>


  <!-- 3. APPROVAL CARDS SECTION -->
  <text x="24" y="286" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" letter-spacing="-0.3">Pending Approvals</text>

  <!-- Approval Card 1 (Sizzling Plate) -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="306" width="342" height="152" rx="22" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
  </g>
  <!-- Stall Icon Thumbnail -->
  <rect x="40" y="324" width="46" height="46" rx="12" fill="#FEF2F2"/>
  <text x="63" y="354" font-family="Inter, system-ui, sans-serif" font-size="20" text-anchor="middle">🍳</text>

  <!-- Description Details -->
  <text x="98" y="338" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Sizzling Plate Canteen</text>
  <text x="98" y="356" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Vendor: Maria Juana</text>
  <text x="98" y="372" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">Registered: May 17, 2026</text>

  <!-- Pending Badge -->
  <rect x="252" y="324" width="102" height="20" rx="10" fill="#EF4444" fill-opacity="0.08"/>
  <text x="303" y="337" fill="#EF4444" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" text-anchor="middle">PENDING APPROVAL</text>

  <!-- Horizontal divider -->
  <line x1="40" y1="392" x2="350" y2="392" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Action Buttons -->
  <!-- Reject -->
  <rect x="40" y="404" width="144" height="38" rx="12" fill="#EF4444" fill-opacity="0.08"/>
  <text x="112" y="427" fill="#EF4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" text-anchor="middle">Reject Stall</text>
  <!-- Approve -->
  <rect x="198" y="404" width="152" height="38" rx="12" fill="#10B981"/>
  <text x="274" y="427" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" text-anchor="middle">Approve Stall</text>


  <!-- Approval Card 2 (Juice Hub) -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="478" width="342" height="152" rx="22" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
  </g>
  <rect x="40" y="496" width="46" height="46" rx="12" fill="#FEF2F2"/>
  <text x="63" y="526" font-family="Inter, system-ui, sans-serif" font-size="20" text-anchor="middle">🥤</text>

  <text x="98" y="510" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Juice &amp; Desserts Hub</text>
  <text x="98" y="528" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Vendor: John Santos</text>
  <text x="98" y="544" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">Registered: May 16, 2026</text>

  <rect x="252" y="496" width="102" height="20" rx="10" fill="#EF4444" fill-opacity="0.08"/>
  <text x="303" y="509" fill="#EF4444" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" text-anchor="middle">PENDING APPROVAL</text>

  <line x1="40" y1="564" x2="350" y2="564" stroke="#F1F5F9" stroke-width="1"/>

  <rect x="40" y="576" width="144" height="38" rx="12" fill="#EF4444" fill-opacity="0.08"/>
  <text x="112" y="599" fill="#EF4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" text-anchor="middle">Reject Stall</text>
  <rect x="198" y="576" width="152" height="38" rx="12" fill="#10B981"/>
  <text x="274" y="599" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" text-anchor="middle">Approve Stall</text>


  <!-- Bottom Navigation Bar representation (iOS styled) -->
  <path d="M0 764H390V844H0V764Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  
  <!-- Approvals Tab (Selected) -->
  <g transform="translate(68, 778)" fill="#EF4444">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" text-anchor="middle">Approvals</text>
  </g>
  
  <!-- Active Vendors List Tab -->
  <g transform="translate(196, 778)" fill="#94A3B8">
    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Vendors</text>
  </g>

  <!-- Platform Sales Tab -->
  <g transform="translate(302, 778)" fill="#94A3B8">
    <path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Revenue</text>
  </g>
</svg>
