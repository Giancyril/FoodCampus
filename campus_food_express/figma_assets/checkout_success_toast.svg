<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (matches Checkout page layout) -->
  <rect width="390" height="844" rx="40" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="3"/>

  <!-- Top Status Bar -->
  <text x="32" y="32" fill="#0F172A" font-family="System-UI, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="-0.2">9:41</text>
  <path d="M328 22H338C339.105 22 340 22.8954 340 24V30C340 31.1046 339.105 32 338 32H328C326.895 32 326 31.1046 326 30V24C326 22.8954 326.895 22 328 22Z" stroke="#0F172A" stroke-width="1.5"/>
  <rect x="328" y="24" width="8" height="6" rx="1" fill="#0F172A"/>

  <!-- Header -->
  <g transform="translate(24, 55)">
    <path d="M0 16H16M0 16L6 10M0 16L6 22" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="22" fill="#CBD5E1" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="900">Checkout</text>
  </g>

  <!-- Checkout details cards (Low opacity under toast) -->
  <g transform="translate(24, 110)" opacity="0.3">
    <rect width="342" height="50" rx="16" fill="#1A365D"/>
    <text x="171" y="30" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="13" font-weight="800">Delivery</text>
  </g>

  <g transform="translate(24, 180)" opacity="0.3">
    <rect width="342" height="136" rx="24" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
  </g>

  <!-- Button: PLACE ORDER (Low opacity under toast) -->
  <g transform="translate(24, 574)" opacity="0.3">
    <rect width="342" height="54" rx="16" fill="#1A365D"/>
    <text x="171" y="32" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="15" font-weight="800">PLACE ORDER (₱235.25)</text>
  </g>

  <!-- Success Toast Overlay (Top Center) -->
  <!-- Clicking the toast links directly to order_confirmation.svg -->
  <a href="order_confirmation.svg" style="cursor: pointer;">
    <g transform="translate(16, 68)">
      <!-- Toast background with soft drop shadow -->
      <rect width="358" height="68" rx="20" fill="#10B981"/>
      
      <!-- Checkmark ring icon -->
      <g transform="translate(18, 18)">
        <circle cx="16" cy="16" r="16" fill="#FFFFFF" fill-opacity="0.2"/>
        <path d="M10 16L14 20L22 12" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      
      <!-- Toast Messages -->
      <text x="64" y="32" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="14" font-weight="800">Checkout Successful!</text>
      <text x="64" y="48" fill="#FFFFFF" fill-opacity="0.8" font-family="'Inter', sans-serif" font-size="12" font-weight="500">Your order #CFE-1061 has been sent.</text>

      <!-- View order action -->
      <text x="338" y="38" text-anchor="end" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="12" font-weight="800">VIEW</text>
    </g>
  </a>
</svg>
