<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F5F6F6"/>

  <!-- DEFINITIONS (Shadows & Gradients) -->
  <defs>
    <!-- Logo Shadow -->
    <filter id="logoShadow" x="-20" y="-20" width="140" height="140" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10B981" flood-opacity="0.08"/>
    </filter>
    
    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0D121B" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- Status Bar placeholder (Standard iOS-style) -->
  <text x="32" y="38" fill="#0D121B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#0D121B">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- 1. FOODELI TOP LOGO SECTION -->
  <g filter="url(#logoShadow)" transform="translate(145, 68)">
    <circle cx="50" cy="50" r="50" fill="#FFFFFF"/>
    <!-- Utensils Cross Icon in Emerald -->
    <path d="M36 30C36 26 38 24 41 24V46H38V52H36V30Z" fill="#10B981"/>
    <path d="M49 24C52 24 54 26 54 30V52H52V46H49V24Z" fill="#10B981"/>
    <rect x="44" y="24" width="3" height="34" rx="1.5" fill="#10B981"/>
    <path d="M60 24C62 24 64 26 64 30V40H61V58H58V40H56V30C56 26 58 24 60 24Z" fill="#10B981"/>
  </g>

  <!-- App Title -->
  <text x="195" y="202" fill="#0D121B" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="-1.0" text-anchor="middle">Foodeli</text>
  <text x="195" y="222" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Premium Campus Food &amp; Fast Delivery</text>

  <!-- 2. LOGIN FORM CARD CONTAINER -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="258" width="342" height="474" rx="28" fill="#FFFFFF"/>
  </g>

  <!-- Form Title -->
  <text x="52" y="298" fill="#0D121B" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5">Sign In</text>
  <text x="52" y="318" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">Welcome back! Please enter your details</text>

  <!-- Form Inputs -->
  <!-- Dropdown Input: Sign In As -->
  <text x="52" y="354" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">SIGN IN AS...</text>
  <rect x="52" y="364" width="286" height="52" rx="16" fill="#F5F6F6"/>
  <!-- User Icon -->
  <path d="M68 390C68 386.7 70.7 384 74 384C77.3 384 80 386.7 80 390C80 393.3 77.3 396 74 396C70.7 396 68 393.3 68 390ZM74 398C70.3 398 64 399.8 64 403.5V406H84V403.5C84 399.8 77.7 398 74 398Z" fill="#7D8B9B"/>
  <text x="96" y="396" fill="#0D121B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Customer / Student</text>
  <!-- Chevron Down -->
  <path d="M312 387L317 392L322 387" stroke="#7D8B9B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Username / Email Input -->
  <text x="52" y="440" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">CAMPUS EMAIL / ID</text>
  <rect x="52" y="450" width="286" height="52" rx="16" fill="#F5F6F6"/>
  <!-- Mail Icon -->
  <path d="M68 471C66.9 471 66 471.9 66 473V479C66 480.1 66.9 481 68 481H80C81.1 481 82 480.1 82 479V473C82 471.9 81.1 471 80 471H68ZM74 477L67.5 473H80.5L74 477Z" fill="#7D8B9B"/>
  <text x="96" y="482" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">20221270@campus.edu</text>

  <!-- Password Input -->
  <text x="52" y="526" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">PASSWORD</text>
  <rect x="52" y="536" width="286" height="52" rx="16" fill="#F5F6F6"/>
  <!-- Lock Icon -->
  <path d="M74 554C71.8 554 70 555.8 70 558V564C70 566.2 71.8 568 74 568H78C80.2 568 82 566.2 82 564V558C82 555.8 80.2 554 78 554H74ZM72 558C72 556.9 72.9 556 74 556H78C79.1 556 80 556.9 80 558V560H72V558Z" fill="#7D8B9B"/>
  <text x="96" y="568" fill="#0D121B" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" letter-spacing="3.0">•••••••••</text>

  <!-- Remember Me & Forgot Password -->
  <!-- Checkbox -->
  <rect x="52" y="608" width="16" height="16" rx="4" fill="#10B981"/>
  <path d="M56 616L58.5 618.5L64 613" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="76" y="621" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Remember me</text>
  
  <!-- Forgot Password Link -->
  <text x="338" y="621" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="end">Forgot Password?</text>

  <!-- 3. ACTION BUTTONS -->
  <!-- Sign In Button (Emerald) -->
  <rect x="52" y="648" width="286" height="52" rx="16" fill="#10B981"/>
  <text x="195" y="680" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900" letter-spacing="-0.2" text-anchor="middle">Sign In</text>

  <!-- Bottom Register Link -->
  <text x="195" y="774" fill="#7D8B9B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">
    Don't have an account? <tspan fill="#10B981" font-weight="800">Sign Up</tspan>
  </text>
</svg>
