<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="390" height="844" rx="40" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="3"/>

  <!-- Top Status Bar -->
  <text x="32" y="32" fill="#0F172A" font-family="System-UI, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="-0.2">9:41</text>
  <path d="M328 22H338C339.105 22 340 22.8954 340 24V30C340 31.1046 339.105 32 338 32H328C326.895 32 326 31.1046 326 30V24C326 22.8954 326.895 22 328 22Z" stroke="#0F172A" stroke-width="1.5"/>
  <rect x="328" y="24" width="8" height="6" rx="1" fill="#0F172A"/>

  <!-- Header -->
  <g transform="translate(24, 55)">
    <!-- Back arrow links to customer_menu.svg -->
    <a href="customer_menu.svg" style="cursor: pointer;">
      <path d="M0 16H16M0 16L6 10M0 16L6 22" stroke="#1A365D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </a>
    <text x="32" y="22" fill="#1A365D" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="900">Your Cart</text>
  </g>

  <!-- Items list inside Cart -->
  <!-- Cart Item 1: Chicken Adobo -->
  <g transform="translate(24, 110)">
    <rect width="342" height="96" rx="20" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
    <g transform="translate(12, 12)">
      <rect width="72" height="72" rx="14" fill="#FEF3C7"/>
      <path d="M16 48C16 56 22 59 36 59C50 59 56 56 56 48H16Z" fill="#D97706"/>
      <ellipse cx="36" cy="45" rx="20" ry="5" fill="#F8FAFC"/>
    </g>
    <text x="98" y="32" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="800">Chicken Adobo Rice Meal</text>
    <text x="98" y="48" fill="#1A365D" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Extra Chicken (+₱30.00)</text>
    <text x="98" y="70" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="800">₱95.00</text>
    
    <!-- Quantity adjuster -->
    <g transform="translate(254, 52)">
      <circle cx="12" cy="12" r="12" fill="#F1F5F9"/>
      <path d="M8 12H16" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
      <text x="34" y="16" text-anchor="middle" fill="#0F172A" font-family="'Inter', sans-serif" font-size="13" font-weight="900">1</text>
      <circle cx="56" cy="12" r="12" fill="#1A365D"/>
      <path d="M52 12H60M56 8V16" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Cart Item 2: Pork Sinigang -->
  <g transform="translate(24, 218)">
    <rect width="342" height="96" rx="20" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
    <g transform="translate(12, 12)">
      <rect width="72" height="72" rx="14" fill="#ECFDF5"/>
      <path d="M16 48C16 56 22 59 36 59C50 59 56 56 56 48H16Z" fill="#059669"/>
    </g>
    <text x="98" y="36" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="800">Pork Sinigang Soup</text>
    <text x="98" y="60" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="800">₱110.00</text>
    
    <!-- Quantity adjuster -->
    <g transform="translate(254, 44)">
      <circle cx="12" cy="12" r="12" fill="#F1F5F9"/>
      <path d="M8 12H16" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
      <text x="34" y="16" text-anchor="middle" fill="#0F172A" font-family="'Inter', sans-serif" font-size="13" font-weight="900">1</text>
      <circle cx="56" cy="12" r="12" fill="#1A365D"/>
      <path d="M52 12H60M56 8V16" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Promo Code section -->
  <g transform="translate(24, 332)">
    <rect width="230" height="46" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="18" y="27" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">Promo: FOODCAMPUS50</text>
    
    <g transform="translate(242, 0)">
      <rect width="100" height="46" rx="14" fill="#1A365D"/>
      <text x="50" y="27" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="13" font-weight="800">Applied</text>
    </g>
  </g>

  <!-- Checkout details calculations -->
  <g transform="translate(24, 400)">
    <rect width="342" height="154" rx="24" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
    
    <g transform="translate(20, 20)">
      <!-- Subtotal -->
      <text x="0" y="16" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">Subtotal</text>
      <text x="302" y="16" text-anchor="end" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="700">₱205.00</text>
      
      <!-- VAT (5%) -->
      <text x="0" y="44" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">VAT (5%)</text>
      <text x="302" y="44" text-anchor="end" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="700">₱10.25</text>

      <!-- Delivery Fee -->
      <text x="0" y="72" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">Delivery Fee</text>
      <text x="302" y="72" text-anchor="end" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="700">₱20.00</text>
      
      <line x1="0" y1="92" x2="302" y2="92" stroke="#F1F5F9" stroke-width="1.5"/>

      <!-- Grand Total -->
      <text x="0" y="118" fill="#1A365D" font-family="'Inter', sans-serif" font-size="15" font-weight="900">Total Basket Cost</text>
      <text x="302" y="118" text-anchor="end" fill="#1A365D" font-family="'Outfit', 'Inter', sans-serif" font-size="18" font-weight="900">₱235.25</text>
    </g>
  </g>

  <!-- Button: PLACE ORDER (Links to checkout.svg) -->
  <a href="checkout.svg" style="cursor: pointer;">
    <g transform="translate(24, 574)">
      <rect width="342" height="54" rx="16" fill="#1A365D"/>
      <text x="171" y="32" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="15" font-weight="800" letter-spacing="-0.2">PROCEED TO CHECKOUT</text>
    </g>
  </a>

  <!-- Navigation Bar capsule -->
  <g transform="translate(24, 762)">
    <rect width="342" height="60" rx="22" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    
    <!-- Home Tab -->
    <a href="student_home.svg" style="cursor: pointer;">
      <g transform="translate(28, 10)">
        <path d="M10 20V12H14V20H19V10L12 3L5 10V20H10Z" fill="#7D8B9B"/>
      </g>
    </a>

    <!-- Cart Tab (Active Dark Blue) -->
    <a href="cart.svg" style="cursor: pointer;">
      <g transform="translate(112, 10)">
        <path d="M4 4H7L9 14H17L19 6H8" stroke="#1A365D" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="10" cy="17" r="1.5" fill="#1A365D"/>
        <circle cx="16" cy="17" r="1.5" fill="#1A365D"/>
        <circle cx="21" cy="4" r="5" fill="#EF4444"/>
        <text x="21" y="7" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="8" font-weight="900">2</text>
      </g>
    </a>

    <!-- Track Status Tab -->
    <a href="active_order_status.svg" style="cursor: pointer;">
      <g transform="translate(204, 10)">
        <rect x="4" y="4" width="16" height="16" rx="3" stroke="#7D8B9B" stroke-width="2.5"/>
        <circle cx="12" cy="12" r="3" fill="#7D8B9B"/>
      </g>
    </a>

    <!-- Profile/History Tab -->
    <a href="order_history.svg" style="cursor: pointer;">
      <g transform="translate(288, 10)">
        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.33 4 18V20H20V18C20 15.33 14.67 14 12 14Z" fill="#7D8B9B"/>
      </g>
    </a>
  </g>
</svg>
