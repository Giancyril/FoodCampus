<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Shadows & Gradients) -->
  <defs>
    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Status Bar placeholder (Standard iOS-style) -->
  <text x="32" y="38" fill="#0D121B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#0D121B">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- 1. HEADER SECTION -->
  <text x="24" y="92" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.8">Track Order</text>

  <!-- 2. STALL INFORMATION & STATUS SUMMARY -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="128" width="342" height="120" rx="24" fill="#FFFFFF"/>
  </g>
  <text x="44" y="162" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900">Maria's Homestyle Meals</text>
  <text x="44" y="180" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">ORDER ID: CFE-88910</text>

  <!-- Preparing Status Badge -->
  <rect x="44" y="196" width="108" height="24" rx="12" fill="#10B981" fill-opacity="0.12"/>
  <circle cx="56" cy="208" r="4" fill="#10B981"/>
  <text x="66" y="212" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900">PREPARING</text>
  
  <text x="346" y="162" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="900" letter-spacing="-0.5" text-anchor="end">₱99.75</text>
  <text x="346" y="180" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end">ASAP Pickup</text>

  <!-- 3. VERBAL ESTIMATE / MESSAGE -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="268" width="342" height="64" rx="16" fill="#F1F5F9"/>
  </g>
  <text x="42" y="296" font-family="Inter, system-ui, sans-serif" font-size="18" text-anchor="start">🍳</text>
  <text x="68" y="295" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800">Your meal is being cooked right now by Chef Maria!</text>
  <text x="68" y="311" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Expected ready in 8-10 mins.</text>

  <!-- 4. STEPPER PROGRESS BAR -->
  <!-- Step 1 (Placed) -->
  <circle cx="50" cy="380" r="12" fill="#10B981"/>
  <!-- Checkmark -->
  <path d="M46 380L49 383L54 377" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="76" y="380" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">Order Placed</text>
  <text x="76" y="394" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">May 17, 2:10 PM</text>
  
  <!-- Line 1 -->
  <line x1="50" y1="392" x2="50" y2="430" stroke="#10B981" stroke-width="3"/>

  <!-- Step 2 (Preparing) -->
  <circle cx="50" cy="442" r="12" fill="#10B981"/>
  <circle cx="50" cy="442" r="6" fill="#FFFFFF"/>
  <text x="76" y="442" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">Preparing Food</text>
  <text x="76" y="456" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800">In Progress</text>

  <!-- Line 2 -->
  <line x1="50" y1="454" x2="50" y2="492" stroke="#E2E8F0" stroke-width="3"/>

  <!-- Step 3 (Ready) -->
  <circle cx="50" cy="504" r="10" fill="#E2E8F0"/>
  <text x="76" y="504" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Ready for Pickup</text>
  <text x="76" y="518" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Pending cooking finish</text>

  <!-- Line 3 -->
  <line x1="50" y1="514" x2="50" y2="552" stroke="#E2E8F0" stroke-width="3"/>

  <!-- Step 4 (Completed) -->
  <circle cx="50" cy="564" r="10" fill="#E2E8F0"/>
  <text x="76" y="564" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Order Completed</text>

  <!-- 5. PICKUP QR CODE DISPLAY -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="608" width="342" height="132" rx="22" fill="#1E2E38" fill-opacity="0.95"/>
  </g>
  <!-- Mini QR Graphic -->
  <rect x="42" y="626" width="96" height="96" rx="12" fill="#FFFFFF"/>
  <!-- QR Details -->
  <rect x="52" y="636" width="32" height="32" stroke="#1E2E38" stroke-width="4" fill="none"/>
  <rect x="96" y="636" width="32" height="32" stroke="#1E2E38" stroke-width="4" fill="none"/>
  <rect x="52" y="680" width="32" height="32" stroke="#1E2E38" stroke-width="4" fill="none"/>
  <rect x="92" y="676" width="16" height="16" fill="#10B981"/>
  <rect x="76" y="660" width="16" height="16" fill="#1E2E38"/>
  <rect x="112" y="692" width="12" height="12" fill="#1E2E38"/>

  <text x="156" y="658" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900" letter-spacing="-0.3">Pickup QR Code</text>
  <text x="156" y="678" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Scan this at Maria's stall window</text>
  <text x="156" y="694" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">upon receipt of ready notice!</text>

  <!-- Bottom Navigation Bar representation (iOS styled) -->
  <path d="M0 764H390V844H0V764Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  
  <!-- Cart Tab -->
  <g transform="translate(53, 778)" fill="#94A3B8">
    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
    <!-- Count badge 1 on Cart icon -->
    <circle cx="21" cy="4" r="7" fill="#EF4444"/>
    <text x="21" y="7" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="900" text-anchor="middle">1</text>
  </g>

  <!-- Orders Track Tab (Selected with green capsule) -->
  <g transform="translate(142, 778)">
    <rect x="-8" y="-4" width="76" height="34" rx="17" fill="#10B981"/>
    <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-14 9c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm11.5-4.5L19.5 8h-2.5v4.5h.5zM17 17c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z" fill="#FFFFFF"/>
    <text x="38" y="17" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900">Track</text>
  </g>

  <!-- History Tab -->
  <g transform="translate(313, 778)" fill="#94A3B8">
    <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
  </g>
</svg>
