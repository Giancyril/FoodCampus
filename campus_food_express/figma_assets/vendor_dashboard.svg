<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Gradients & Shadows) -->
  <defs>
    <!-- Midnight Navy Gradient Header (Option B) -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="390" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Metrics Panel Shadow -->
    <filter id="panelShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 1. VENDOR HEADER SECTION (MIDNIGHT NAVY GRADIENT) -->
  <path d="M0 0H390V230C390 246.569 376.569 260 360 260H30C13.4315 260 0 246.569 0 230V0Z" fill="url(#headerGrad)"/>

  <!-- Status Bar placeholder (Standard iOS-style) -->
  <text x="32" y="38" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#FFFFFF">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- Stall Name Title -->
  <text x="24" y="86" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5">Chef Maria's Stall</text>

  <!-- Verified Badge Chip -->
  <rect x="24" y="98" width="112" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <!-- Verified Badge Star Icon -->
  <path d="M35 109C35 107.5 36.2 106.3 37.7 106.3C39.2 106.3 40.4 107.5 40.4 109C40.4 110.5 39.2 111.7 37.7 111.7C36.2 111.7 35 110.5 35 109ZM37.7 107.5L38.2 108.5H39.2L38.4 109.1L38.7 110.1L37.7 109.5L36.7 110.1L37 109.1L36.2 108.5H37.2L37.7 107.5Z" fill="#10B981"/>
  <text x="48" y="113" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800">Active Authority</text>

  <!-- 2. FLOATING METRICS PANEL -->
  <g filter="url(#panelShadow)">
    <rect x="24" y="136" width="342" height="154" rx="24" fill="#1E2E38" fill-opacity="0.95" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1.5"/>
  </g>

  <!-- Today's Sales label and Value -->
  <text x="44" y="166" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">TODAY'S SALES:</text>
  <text x="44" y="202" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="-1.0">₱4,520</text>

  <!-- Active Orders label and Green Box Count -->
  <text x="264" y="166" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="end">ACTIVE ORDERS:</text>
  <rect x="226" y="174" width="38" height="30" rx="8" fill="#10B981"/>
  <text x="245" y="195" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" text-anchor="middle">8</text>

  <!-- "OPEN FOR ORDERS" Switch pill status -->
  <rect x="44" y="222" width="232" height="42" rx="21" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-opacity="0.2"/>
  <text x="144" y="247" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="0.5" text-anchor="middle">OPEN FOR ORDERS</text>
  <circle cx="218" cy="243" r="4" fill="#10B981"/>

  <!-- Settings Gear Button -->
  <rect x="288" y="222" width="42" height="42" rx="12" fill="#2E3E4F"/>
  <!-- Gear Icon -->
  <path d="M309 238C307.343 238 306 239.343 306 241C306 242.657 307.343 244 309 244C310.657 244 312 242.657 312 241C312 239.343 310.657 238 309 238Z" fill="#FFFFFF"/>
  <circle cx="309" cy="241" r="5" stroke="#FFFFFF" stroke-width="2" fill="none"/>


  <!-- 3. MENU MANAGEMENT DROPDOWN HEADER -->
  <text x="24" y="322" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900" letter-spacing="0.5">MENU MANAGEMENT</text>
  <path d="M354 316L359 321L364 316" stroke="#0F172A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>


  <!-- 4. FIGMA DARK-SLATE MENU ITEM CARDS -->
  <!-- Dish Card 1 (Available) -->
  <rect x="24" y="342" width="342" height="92" rx="20" fill="#1E2E38"/>
  <!-- Image thumbnail -->
  <rect x="36" y="353" width="70" height="70" rx="14" fill="#475569"/>
  <text x="71" y="396" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle">🍗</text>
  <!-- Description -->
  <text x="120" y="380" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Adobo Chicken Rice</text>
  <text x="120" y="402" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">₱140</text>
  <circle cx="168" cy="398" r="3" fill="#10B981"/>
  <text x="176" y="401" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Available</text>
  <!-- Edit Pen -->
  <circle cx="282" cy="388" r="16" fill="#FFFFFF" fill-opacity="0.06"/>
  <path d="M278 392L286 384L284 382L276 390V392H278Z" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Switch Toggle ON -->
  <rect x="306" y="374" width="38" height="22" rx="11" fill="#10B981"/>
  <circle cx="323" cy="385" r="8" fill="#FFFFFF"/>

  <!-- Dish Card 2 (Available) -->
  <rect x="24" y="448" width="342" height="92" rx="20" fill="#1E2E38"/>
  <rect x="36" y="459" width="70" height="70" rx="14" fill="#475569"/>
  <text x="71" y="502" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle">🍛</text>
  <text x="120" y="486" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Pork Sisig Meal</text>
  <text x="120" y="508" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">₱150</text>
  <circle cx="168" cy="504" r="3" fill="#10B981"/>
  <text x="176" y="507" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Available</text>
  <circle cx="282" cy="494" r="16" fill="#FFFFFF" fill-opacity="0.06"/>
  <path d="M278 498L286 490L284 488L276 496V498H278Z" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="306" y="480" width="38" height="22" rx="11" fill="#10B981"/>
  <circle cx="323" cy="491" r="8" fill="#FFFFFF"/>

  <!-- Dish Card 3 (Sold Out) -->
  <rect x="24" y="554" width="342" height="92" rx="20" fill="#1E2E38" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
  <rect x="36" y="565" width="70" height="70" rx="14" fill="#334155"/>
  <text x="71" y="608" fill="#FFFFFF" fill-opacity="0.4" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle">🍜</text>
  <text x="120" y="592" fill="#FFFFFF" fill-opacity="0.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Special Ramen Bowl</text>
  <text x="120" y="614" fill="#FFFFFF" fill-opacity="0.5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">₱180</text>
  <text x="120" y="628" fill="#F87171" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">Sold Out</text>
  <circle cx="282" cy="600" r="16" fill="#FFFFFF" fill-opacity="0.04"/>
  <path d="M278 604L286 596L284 594L276 602V604H278Z" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Switch Toggle OFF -->
  <rect x="306" y="586" width="38" height="22" rx="11" fill="#334155"/>
  <circle cx="317" cy="597" r="8" fill="#94A3B8"/>


  <!-- 5. FLOATING ACTION BUTTON (Add Food in Emerald) -->
  <g filter="url(#panelShadow)">
    <rect x="238" y="680" width="128" height="48" rx="24" fill="#10B981"/>
  </g>
  <path d="M256 704H268M262 698V710" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="312" y="709" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900" text-anchor="middle">Add Food</text>


  <!-- Bottom Navigation Bar representation (iOS styled) -->
  <path d="M0 764H390V844H0V764Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  
  <!-- Stall Menu Tab (Selected) -->
  <g transform="translate(68, 778)" fill="#10B981">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" text-anchor="middle">Menu</text>
  </g>
  
  <!-- Stall Orders Tab -->
  <g transform="translate(196, 778)" fill="#94A3B8">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Orders</text>
  </g>

  <!-- Stall Profile Tab -->
  <g transform="translate(302, 778)" fill="#94A3B8">
    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Account</text>
  </g>
</svg>
