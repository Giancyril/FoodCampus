<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Gradients & Shadows) -->
  <defs>
    <!-- Midnight Navy Gradient Header (Option B) -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="390" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Card/Panel Shadow -->
    <filter id="panelShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 1. VENDOR HEADER CARD -->
  <path d="M0 0H390V210C390 230 370 248 348 248H42C20 248 0 230 0 210V0Z" fill="url(#headerGrad)"/>

  <!-- Status Bar placeholder -->
  <text x="32" y="38" fill="#FFFFFF" fill-opacity="0.6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#FFFFFF" fill-opacity="0.6">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- Stall Name Title -->
  <text x="32" y="86" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.5">Maria's Homestyle Meals</text>

  <!-- Verified Badge Chip -->
  <rect x="32" y="98" width="112" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <!-- Verified Badge Star Icon -->
  <g transform="translate(42, 102)" fill="#10B981">
    <path d="M6 1L7.2 4.5H11L8.2 6.5L9.2 10L6 8L2.8 10L3.8 6.5L1 4.5H4.8L6 1Z"/>
  </g>
  <text x="56" y="113" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800">Active Authority</text>

  <!-- Logout Button on header right -->
  <circle cx="342" cy="92" r="18" fill="#FFFFFF" fill-opacity="0.08"/>
  <path d="M336 92h8m-3-3l3 3-3 3" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M339 87h-3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h3" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 2. FLOATING METRICS PANEL -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="148" width="326" height="154" rx="24" fill="#1E2E38" fill-opacity="0.95" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1.5"/>
  </g>

  <!-- Today's Sales label and Value -->
  <text x="52" y="180" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Today's Sales:</text>
  <text x="52" y="218" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="-1.0">₱4,745</text>

  <!-- Active Orders label and Green Box Count -->
  <text x="338" y="180" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="end">Active Orders:</text>
  <rect x="290" y="190" width="48" height="36" rx="10" fill="#10B981"/>
  <text x="314" y="213" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" text-anchor="middle">0</text>

  <!-- "OPEN FOR ORDERS" Switch status pill -->
  <rect x="52" y="238" width="220" height="42" rx="21" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="148" y="263" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="0.5" text-anchor="middle">OPEN FOR ORDERS</text>
  <circle cx="218" cy="259" r="4.5" fill="#10B981"/>

  <!-- Settings Gear Button -->
  <rect x="286" y="238" width="42" height="42" rx="12" fill="#2E3E4F"/>
  <!-- Gear Icon -->
  <g transform="translate(297, 249)" fill="#FFFFFF">
    <path d="M10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm-7.6 1.7a1 1 0 0 1 1-1h1.2a1 1 0 0 1 1 1c.2.6.5 1.1.9 1.6a1 1 0 0 1 0 1.2l-.8.8a1 1 0 0 1-1.4 0l-1.2-1.2a1 1 0 0 1 0-1.4zm15.2 2.6a1 1 0 0 1 0 1.4l-.8.8a1 1 0 0 1-1.4 0l-1.2-1.2a1 1 0 0 1 0-1.4c.2-.6.5-1.1.9-1.6a1 1 0 0 1 1 0h1.2a1 1 0 0 1 1 1v1z"/>
  </g>

  <!-- 3. MENU MANAGEMENT HEADER -->
  <text x="32" y="342" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" letter-spacing="0.5">MENU MANAGEMENT</text>
  <!-- Chevron Down -->
  <path d="M344 336L348 340L352 336" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 4. MENU ITEM CARDS -->
  <!-- Dish Card 1: Chicken Adobo Rice Meal (Available) -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="362" width="326" height="92" rx="20" fill="#1E2E38"/>
  </g>
  <!-- Thumbnail with Vector Illustration of Adobo -->
  <rect x="44" y="373" width="70" height="70" rx="14" fill="#FFFFFF"/>
  <g transform="translate(79, 408)">
    <circle cx="0" cy="0" r="26" fill="#FEF3C7"/>
    <circle cx="0" cy="0" r="22" fill="#78350F"/>
    <circle cx="-6" cy="-4" r="5" fill="#FBBF24"/>
    <circle cx="6" cy="6" r="4" fill="#FFFFFF" fill-opacity="0.9"/>
  </g>
  <text x="126" y="394" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Chicken Adobo Rice Meal</text>
  <text x="126" y="418" fill="#FFFFFF" fill-opacity="0.8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">₱95</text>
  <circle cx="166" cy="414" r="3.5" fill="#10B981"/>
  <text x="174" y="418" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800">Available</text>
  
  <!-- Edit Pen Button -->
  <circle cx="274" cy="408" r="17" fill="#FFFFFF" fill-opacity="0.08"/>
  <path d="M270 412l7-7l-2-2l-7 7v2z" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Switch Toggle ON -->
  <rect x="298" y="396" width="42" height="24" rx="12" fill="#10B981"/>
  <circle cx="310" cy="408" r="9" fill="#FFFFFF"/>

  <!-- Dish Card 2: Pork Sinigang Soup (Available) -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="468" width="326" height="92" rx="20" fill="#1E2E38"/>
  </g>
  <!-- Thumbnail with Vector Soup Illustration -->
  <rect x="44" y="479" width="70" height="70" rx="14" fill="#FFFFFF"/>
  <g transform="translate(79, 514)">
    <circle cx="0" cy="0" r="26" fill="#DCFCE7"/>
    <circle cx="0" cy="0" r="22" fill="#15803D"/>
    <circle cx="-4" cy="-4" r="5" fill="#EF4444"/>
    <circle cx="6" cy="6" r="4" fill="#FBBF24"/>
  </g>
  <text x="126" y="500" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Pork Sinigang Soup</text>
  <text x="126" y="524" fill="#FFFFFF" fill-opacity="0.8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800">₱110</text>
  <circle cx="166" cy="520" r="3.5" fill="#10B981"/>
  <text x="174" y="524" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800">Available</text>
  
  <!-- Edit Pen Button -->
  <circle cx="274" cy="514" r="17" fill="#FFFFFF" fill-opacity="0.08"/>
  <path d="M270 518l7-7l-2-2l-7 7v2z" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Switch Toggle ON -->
  <rect x="298" y="502" width="42" height="24" rx="12" fill="#10B981"/>
  <circle cx="310" cy="514" r="9" fill="#FFFFFF"/>

  <!-- FAB: Add Food Button -->
  <g filter="url(#panelShadow)">
    <rect x="230" y="670" width="128" height="48" rx="24" fill="#10B981"/>
  </g>
  <path d="M246 694H258M252 688V700" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="302" y="699" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900" text-anchor="middle">Add Food</text>

  <!-- 5. BOTTOM NAVIGATION BAR (Receipts/Orders, Menu highlighted in purple, Analytics) -->
  <path d="M0 754H390V844H0V754Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Tab 1: Orders (grey receipts list) -->
  <g transform="translate(62, 776)" fill="#94A3B8">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
  </g>

  <!-- Tab 2: Menu (Selected Active Purple Pill) -->
  <g transform="translate(145, 768)">
    <rect x="0" y="0" width="98" height="38" rx="19" fill="#5562EA"/>
    <!-- Utensils/Menu Icon -->
    <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V19h2.5v-7.03C11.34 11.84 13 10.12 13 8V2h-2v7zm4-3v5h1.5v8h2v-8H20V2c-2.76 0-5 2.24-5 4z" fill="#FFFFFF" transform="translate(12, 6) Scale(0.9)"/>
    <text x="64" y="24" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900">Menu</text>
  </g>

  <!-- Tab 3: Analytics (grey bar chart) -->
  <g transform="translate(296, 776)" fill="#94A3B8">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
  </g>
</svg>
