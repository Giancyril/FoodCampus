<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Gradients & Shadows) -->
  <defs>
    <!-- Midnight Navy Gradient Header (Option B) -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="390" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Promotional Salad Banner Gradient -->
    <linearGradient id="promoGrad" x1="20" y1="260" x2="370" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- 1. FIGMA HEADER SECTION (MIDNIGHT NAVY GRADIENT) -->
  <path d="M0 0H390V210C390 226.569 376.569 240 360 240H30C13.4315 240 0 226.569 0 210V0Z" fill="url(#headerGrad)"/>

  <!-- Status Bar placeholder (Standard iOS-style) -->
  <text x="32" y="38" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <!-- Wi-Fi, Signal, Battery Icons placeholder -->
  <g transform="translate(320, 28)" fill="#FFFFFF">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- "Good morning," Greeting text -->
  <text x="24" y="84" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.5">GOOD MORNING,</text>
  <text x="24" y="112" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.5">Jhonford Deguzman!</text>

  <!-- Custom Bell Icon with active notification green dot -->
  <rect x="290" y="78" width="36" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.08"/>
  <path d="M308 87C304.686 87 302 89.6863 302 93V97.5L300 99.5V101H316V99.5L314 97.5V93C314 89.6863 311.314 87 308 87Z" fill="#FFFFFF"/>
  <circle cx="314" cy="87" r="4" fill="#10B981" stroke="#0F172A" stroke-width="1.5"/>

  <!-- Letter initial Circular Avatar -->
  <circle cx="348" cy="96" r="18" fill="#10B981"/>
  <text x="348" y="101" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900" text-anchor="middle">J</text>

  <!-- Search Bar with translucent overlay and rounded corner -->
  <rect x="24" y="148" width="342" height="48" rx="14" fill="#FFFFFF" fill-opacity="0.08"/>
  <!-- Search Magnifier Icon -->
  <circle cx="48" cy="172" r="6" stroke="#94A3B8" stroke-width="2" fill="none"/>
  <line x1="53" y1="177" x2="59" y2="183" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <text x="68" y="177" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Search for meals, cafes...</text>


  <!-- 2. PROMOTIONAL salad BANNER -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="260" width="342" height="110" rx="24" fill="url(#promoGrad)"/>
  </g>
  <!-- Background circular graphics -->
  <circle cx="310" cy="315" r="70" fill="#FFFFFF" fill-opacity="0.1"/>
  <text x="44" y="302" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" letter-spacing="-0.5">Campus Lunch Specials</text>
  <text x="44" y="322" fill="#FFFFFF" fill-opacity="0.9" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Fresh salads delivered under 15 mins</text>
  
  <!-- Banner Button -->
  <rect x="44" y="336" width="94" height="26" rx="13" fill="#FFFFFF"/>
  <text x="91" y="352" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="900" text-anchor="middle">CLAIM 25% OFF</text>

  <!-- Overlapping salad bowl vector artwork -->
  <circle cx="300" cy="315" r="42" fill="#FFFFFF"/>
  <circle cx="300" cy="315" r="38" fill="#D1FAE5"/>
  <path d="M280 305C290 295 310 295 320 305" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  <circle cx="290" cy="325" r="5" fill="#EF4444"/>
  <circle cx="312" cy="328" r="6" fill="#F59E0B"/>
  <circle cx="302" cy="310" r="4" fill="#3B82F6"/>


  <!-- 3. CATEGORIES SECTIONS (Pure Text pills, no icons) -->
  <text x="24" y="405" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900" letter-spacing="-0.3">Categories</text>
  
  <!-- Horizontal scrollable pills -->
  <!-- "Meals" - Selected -->
  <rect x="24" y="420" width="70" height="34" rx="17" fill="#10B981"/>
  <text x="59" y="441" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" text-anchor="middle">Meals</text>
  
  <!-- "Drinks" -->
  <rect x="102" y="420" width="74" height="34" rx="17" fill="#F1F5F9"/>
  <text x="139" y="441" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Drinks</text>
  
  <!-- "Desserts" -->
  <rect x="184" y="420" width="86" height="34" rx="17" fill="#F1F5F9"/>
  <text x="227" y="441" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Desserts</text>

  <!-- "Snacks" -->
  <rect x="278" y="420" width="76" height="34" rx="17" fill="#F1F5F9"/>
  <text x="316" y="441" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Snacks</text>


  <!-- 4. LANDSCAPE STALLS LIST -->
  <text x="24" y="488" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900" letter-spacing="-0.3">Campus Canteens</text>

  <!-- Canteen Card 1 (Chef Maria's Canteen Stall) -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="506" width="342" height="106" rx="22" fill="#F1F5F9"/>
  </g>
  <!-- Stall image thumbnail -->
  <rect x="36" y="519" width="80" height="80" rx="16" fill="#CBD5E1"/>
  <!-- Chef graphic inside thumbnail -->
  <circle cx="76" cy="552" r="16" fill="#10B981"/>
  <text x="76" y="557" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" text-anchor="middle">🍳</text>
  
  <!-- Stall metadata -->
  <text x="130" y="540" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Chef Maria's Stall</text>
  <text x="130" y="556" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">Campus Center • Western</text>
  
  <!-- Rating Star with count -->
  <path d="M135 565L136.5 569.5H141.2L137.4 572.2L138.8 576.7L135 574L131.2 576.7L132.6 572.2L128.8 569.5H133.5L135 565Z" fill="#F59E0B"/>
  <text x="145" y="574" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800">4.8</text>
  <text x="166" y="574" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">(1.2k+ reviews)</text>
  
  <text x="130" y="591" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">₱₱, Fast Delivery (15-20m)</text>

  <!-- Emerald Order Now Button -->
  <rect x="272" y="543" width="82" height="32" rx="10" fill="#10B981"/>
  <text x="313" y="563" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="900" text-anchor="middle">Order Now</text>


  <!-- Canteen Card 2 (University Plaza Stall) -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="626" width="342" height="106" rx="22" fill="#F1F5F9"/>
  </g>
  <rect x="36" y="639" width="80" height="80" rx="16" fill="#CBD5E1"/>
  <circle cx="76" cy="672" r="16" fill="#3B82F6"/>
  <text x="76" y="677" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900" text-anchor="middle">🍔</text>
  
  <text x="130" y="660" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Plaza Burger Express</text>
  <text x="130" y="676" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">University Plaza • Fast Food</text>
  
  <path d="M135 685L136.5 689.5H141.2L137.4 692.2L138.8 696.7L135 694L131.2 696.7L132.6 692.2L128.8 689.5H133.5L135 685Z" fill="#F59E0B"/>
  <text x="145" y="694" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800">4.5</text>
  <text x="166" y="694" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">(800+ reviews)</text>
  
  <text x="130" y="711" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">₱, Fast Delivery (10-15m)</text>

  <rect x="272" y="663" width="82" height="32" rx="10" fill="#10B981"/>
  <text x="313" y="683" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="900" text-anchor="middle">Order Now</text>


  <!-- Bottom Navigation Bar representation (iOS styled) -->
  <path d="M0 764H390V844H0V764Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  
  <!-- Home Tab (Selected) -->
  <g transform="translate(48, 778)" fill="#10B981">
    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" text-anchor="middle">Home</text>
  </g>
  
  <!-- Cart Tab -->
  <g transform="translate(142, 778)" fill="#94A3B8">
    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Cart</text>
  </g>

  <!-- Orders Tab -->
  <g transform="translate(232, 778)" fill="#94A3B8">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Orders</text>
  </g>

  <!-- Profile Tab -->
  <g transform="translate(318, 778)" fill="#94A3B8">
    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    <text x="12" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">Profile</text>
  </g>
</svg>
