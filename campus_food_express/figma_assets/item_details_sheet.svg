<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with slight overlay sheet representation -->
  <rect width="390" height="844" rx="40" fill="#000000" fill-opacity="0.4" stroke="#E2E8F0" stroke-width="3"/>

  <!-- Top Status Bar (White) -->
  <text x="32" y="32" fill="#FFFFFF" fill-opacity="0.8" font-family="System-UI, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="-0.2">9:41</text>

  <!-- Bottom Sheet Card (White) -->
  <path d="M0 160C0 140 18 120 40 120H350C372 120 390 140 390 160V844H0V160Z" fill="#FFFFFF"/>
  <rect x="175" y="132" width="40" height="4" rx="2" fill="#CBD5E1"/>

  <!-- Close and Food details -->
  <g transform="translate(24, 160)">
    <!-- Back arrow links to customer_menu.svg -->
    <a href="customer_menu.svg" style="cursor: pointer;">
      <path d="M0 16H16M0 16L6 10M0 16L6 22" stroke="#1A365D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </a>
    
    <!-- Food Image Banner -->
    <g transform="translate(0, 40)">
      <rect width="342" height="180" rx="24" fill="#FEF3C7"/>
      <!-- Premium Food Bowl drawing -->
      <path d="M111 130C111 156 126 166 171 166C216 166 231 156 231 130H111Z" fill="#D97706"/>
      <ellipse cx="171" cy="124" rx="55" ry="14" fill="#F8FAFC"/>
      <!-- Chicken chunks -->
      <rect x="145" y="104" width="22" height="16" rx="5" fill="#78350F"/>
      <rect x="175" y="108" width="20" height="14" rx="5" fill="#92400E"/>
      <!-- Boiled egg slice -->
      <circle cx="171" cy="120" r="14" fill="#FFFFFF"/>
      <circle cx="171" cy="120" r="8" fill="#FBBF24"/>
    </g>
    
    <!-- Item Header Info -->
    <text x="0" y="254" fill="#0F172A" font-family="'Outfit', 'Inter', sans-serif" font-size="22" font-weight="900">Chicken Adobo Rice Meal</text>
    <text x="0" y="280" fill="#1A365D" font-family="'Inter', sans-serif" font-size="18" font-weight="800">₱95.00</text>
    <text x="0" y="304" fill="#7D8B9B" font-family="'Inter', sans-serif" font-size="13" font-weight="400">Tender chicken marinated in dynamic soy sauce, vinegar,</text>
    <text x="0" y="322" fill="#7D8B9B" font-family="'Inter', sans-serif" font-size="13" font-weight="400">and garlic served with fragrant steamed rice and boiled egg.</text>

    <!-- Customization Addons Checklist -->
    <text x="0" y="356" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="800">Add-ons</text>
    
    <!-- Checkbox 1 (Active) -->
    <g transform="translate(0, 372)">
      <rect width="20" height="20" rx="6" fill="#1A365D"/>
      <!-- Checkmark -->
      <path d="M5 10L9 14L15 6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="15" fill="#0F172A" font-family="'Inter', sans-serif" font-size="13" font-weight="700">Extra Chicken</text>
      <text x="342" y="15" text-anchor="end" fill="#1A365D" font-family="'Inter', sans-serif" font-size="13" font-weight="800">+₱30.00</text>
    </g>

    <!-- Checkbox 2 -->
    <g transform="translate(0, 408)">
      <rect width="20" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <text x="32" y="15" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">Extra Rice</text>
      <text x="342" y="15" text-anchor="end" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">+₱20.00</text>
    </g>

    <!-- Checkbox 3 -->
    <g transform="translate(0, 444)">
      <rect width="20" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <text x="32" y="15" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">Extra Sauce</text>
      <text x="342" y="15" text-anchor="end" fill="#64748B" font-family="'Inter', sans-serif" font-size="13" font-weight="600">+₱10.00</text>
    </g>

    <!-- Quantity controller -->
    <text x="0" y="496" fill="#0F172A" font-family="'Inter', sans-serif" font-size="14" font-weight="800">Quantity</text>
    <g transform="translate(250, 476)">
      <!-- Minus -->
      <circle cx="16" cy="16" r="16" fill="#F1F5F9"/>
      <path d="M10 16H22" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
      
      <text x="46" y="21" text-anchor="middle" fill="#0F172A" font-family="'Inter', sans-serif" font-size="15" font-weight="900">1</text>
      
      <!-- Plus -->
      <circle cx="76" cy="16" r="16" fill="#1A365D"/>
      <path d="M70 16H82M76 10V22" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Add to Cart CTA button (Links back to customer_menu.svg showing active view cart) -->
    <a href="customer_menu.svg" style="cursor: pointer;">
      <g transform="translate(0, 540)">
        <rect width="342" height="54" rx="16" fill="#1A365D"/>
        <text x="171" y="32" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="15" font-weight="800" letter-spacing="-0.2">Add to Cart • ₱125.00</text>
      </g>
    </a>
  </g>
</svg>
