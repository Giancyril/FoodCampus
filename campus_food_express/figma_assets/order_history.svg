<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Shadows & Gradients) -->
  <defs>
    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Status Bar placeholder (Standard iOS-style) -->
  <text x="32" y="38" fill="#0D121B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#0D121B">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- 1. HEADER SECTION -->
  <text x="24" y="92" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.8">Order History</text>

  <!-- 2. HISTORY RECORD CARD (Maria's Meals CFE-88910) -->
  <g filter="url(#cardShadow)">
    <rect x="24" y="128" width="342" height="184" rx="24" fill="#FFFFFF"/>
  </g>
  
  <text x="44" y="166" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900">Maria's Homestyle Meals</text>
  <text x="346" y="166" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" letter-spacing="-0.5" text-anchor="end">₱225.00</text>

  <text x="44" y="186" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Order CFE-88910</text>
  
  <!-- Items summary line -->
  <text x="44" y="210" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">2x Chicken Adobo Rice Meal, 1x Iced Sweet Melon...</text>

  <!-- Divider line -->
  <line x1="44" y1="228" x2="346" y2="228" stroke="#F1F5F9" stroke-width="1.5"/>

  <!-- Rating Block -->
  <text x="44" y="254" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800">Your Rating:</text>
  
  <!-- 5 Stars Vector representation -->
  <g transform="translate(122, 242)" fill="#F59E0B">
    <!-- Star 1 -->
    <path d="M6 0L7.5 4.5H12.2L8.4 7.2L9.8 11.7L6 9L2.2 11.7L3.6 7.2L-0.2 4.5H4.5L6 0Z"/>
    <!-- Star 2 -->
    <path d="M6 0L7.5 4.5H12.2L8.4 7.2L9.8 11.7L6 9L2.2 11.7L3.6 7.2L-0.2 4.5H4.5L6 0Z" transform="translate(16, 0)"/>
    <!-- Star 3 -->
    <path d="M6 0L7.5 4.5H12.2L8.4 7.2L9.8 11.7L6 9L2.2 11.7L3.6 7.2L-0.2 4.5H4.5L6 0Z" transform="translate(32, 0)"/>
    <!-- Star 4 -->
    <path d="M6 0L7.5 4.5H12.2L8.4 7.2L9.8 11.7L6 9L2.2 11.7L3.6 7.2L-0.2 4.5H4.5L6 0Z" transform="translate(48, 0)"/>
    <!-- Star 5 -->
    <path d="M6 0L7.5 4.5H12.2L8.4 7.2L9.8 11.7L6 9L2.2 11.7L3.6 7.2L-0.2 4.5H4.5L6 0Z" transform="translate(64, 0)"/>
  </g>

  <!-- Review text block -->
  <text x="44" y="280" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-style="italic" font-size="12" font-weight="600">"Super delicious and arrived very hot!"</text>

  <!-- Bottom Navigation Bar representation (iOS styled) -->
  <path d="M0 764H390V844H0V764Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  
  <!-- Cart Tab -->
  <g transform="translate(53, 778)" fill="#94A3B8">
    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
    <!-- Count badge 1 on Cart icon -->
    <circle cx="21" cy="4" r="7" fill="#EF4444"/>
    <text x="21" y="7" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="900" text-anchor="middle">1</text>
  </g>

  <!-- Orders Track Tab -->
  <g transform="translate(183, 778)" fill="#94A3B8">
    <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-14 9c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm11.5-4.5L19.5 8h-2.5v4.5h.5zM17 17c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
  </g>

  <!-- History Tab (Selected with green capsule) -->
  <g transform="translate(266, 778)">
    <rect x="-8" y="-4" width="86" height="34" rx="17" fill="#10B981"/>
    <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" fill="#FFFFFF"/>
    <text x="38" y="17" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="900">History</text>
  </g>
</svg>
