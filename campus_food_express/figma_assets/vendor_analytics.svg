<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft grey application background -->
  <rect width="390" height="844" fill="#F8FAFC"/>

  <!-- DEFINITIONS (Gradients & Shadows) -->
  <defs>
    <!-- Midnight Navy Gradient Header (Option B) -->
    <linearGradient id="headerGrad" x1="0" y1="0" x2="390" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Card/Panel Shadow -->
    <filter id="panelShadow" x="-10" y="-10" width="410" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    
    <!-- Purple to Emerald Chart Bar Gradient -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5562EA"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- 1. VENDOR HEADER CARD -->
  <path d="M0 0H390V210C390 230 370 248 348 248H42C20 248 0 230 0 210V0Z" fill="url(#headerGrad)"/>

  <!-- Status Bar placeholder -->
  <text x="32" y="38" fill="#FFFFFF" fill-opacity="0.6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">9:41</text>
  <g transform="translate(320, 28)" fill="#FFFFFF" fill-opacity="0.6">
    <path d="M2 3h2v8H2V3zm4-2h2v10H6V1zm4 4h2v6h-2V5zm4-3h2v9h-2V2z"/>
  </g>

  <!-- Stall Name Title -->
  <text x="32" y="86" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.5">Maria's Homestyle Meals</text>

  <!-- Verified Badge Chip -->
  <rect x="32" y="98" width="112" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <!-- Verified Badge Star Icon -->
  <g transform="translate(42, 102)" fill="#10B981">
    <path d="M6 1L7.2 4.5H11L8.2 6.5L9.2 10L6 8L2.8 10L3.8 6.5L1 4.5H4.8L6 1Z"/>
  </g>
  <text x="56" y="113" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800">Active Authority</text>

  <!-- Logout Button on header right -->
  <circle cx="342" cy="92" r="18" fill="#FFFFFF" fill-opacity="0.08"/>
  <path d="M336 92h8m-3-3l3 3-3 3" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M339 87h-3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h3" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- 2. FLOATING METRICS PANEL -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="148" width="326" height="154" rx="24" fill="#1E2E38" fill-opacity="0.95" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1.5"/>
  </g>

  <!-- Today's Sales label and Value -->
  <text x="52" y="180" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Total Revenue:</text>
  <text x="52" y="218" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="-1.0">₱14,520</text>

  <!-- Active Orders label and Green Box Count -->
  <text x="338" y="180" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="end">Active Orders:</text>
  <rect x="290" y="190" width="48" height="36" rx="10" fill="#10B981"/>
  <text x="314" y="213" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" text-anchor="middle">0</text>

  <!-- "OPEN FOR ORDERS" Switch status pill -->
  <rect x="52" y="238" width="220" height="42" rx="21" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="148" y="263" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900" letter-spacing="0.5" text-anchor="middle">OPEN FOR ORDERS</text>
  <circle cx="218" cy="259" r="4.5" fill="#10B981"/>

  <!-- Settings Gear Button -->
  <rect x="286" y="238" width="42" height="42" rx="12" fill="#2E3E4F"/>
  <!-- Gear Icon -->
  <g transform="translate(297, 249)" fill="#FFFFFF">
    <path d="M10 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm-7.6 1.7a1 1 0 0 1 1-1h1.2a1 1 0 0 1 1 1c.2.6.5 1.1.9 1.6a1 1 0 0 1 0 1.2l-.8.8a1 1 0 0 1-1.4 0l-1.2-1.2a1 1 0 0 1 0-1.4zm15.2 2.6a1 1 0 0 1 0 1.4l-.8.8a1 1 0 0 1-1.4 0l-1.2-1.2a1 1 0 0 1 0-1.4c.2-.6.5-1.1.9-1.6a1 1 0 0 1 1 0h1.2a1 1 0 0 1 1 1v1z"/>
  </g>

  <!-- 3. REVENUE CHART CARD -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="322" width="326" height="248" rx="24" fill="#FFFFFF"/>
  </g>
  <text x="50" y="352" fill="#0F172A" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="900">Weekly Revenue</text>
  <text x="340" y="352" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="end">May 11 - May 17</text>

  <!-- Bar Chart Graphics -->
  <g transform="translate(50, 380)">
    <!-- Grid Lines -->
    <line x1="0" y1="120" x2="290" y2="120" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="0" y1="80" x2="290" y2="80" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="0" y1="40" x2="290" y2="40" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="290" y2="0" stroke="#F1F5F9" stroke-width="1.5"/>

    <!-- Bar 1: Mon (₱2,100) -->
    <rect x="14" y="50" width="24" height="70" rx="4" fill="url(#barGrad)"/>
    <text x="26" y="136" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Mon</text>

    <!-- Bar 2: Tue (₱2,800) -->
    <rect x="62" y="30" width="24" height="90" rx="4" fill="url(#barGrad)"/>
    <text x="74" y="136" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Tue</text>

    <!-- Bar 3: Wed (₱1,500) -->
    <rect x="110" y="70" width="24" height="50" rx="4" fill="url(#barGrad)"/>
    <text x="122" y="136" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Wed</text>

    <!-- Bar 4: Thu (₱3,200) -->
    <rect x="158" y="20" width="24" height="100" rx="4" fill="url(#barGrad)"/>
    <text x="170" y="136" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Thu</text>

    <!-- Bar 5: Fri (₱2,400) -->
    <rect x="206" y="40" width="24" height="80" rx="4" fill="url(#barGrad)"/>
    <text x="218" y="136" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Fri</text>

    <!-- Bar 6: Sat (Active Today - ₱4,745) -->
    <rect x="254" y="0" width="24" height="120" rx="4" fill="#10B981"/>
    <text x="266" y="136" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="900" text-anchor="middle">Sat</text>
  </g>

  <!-- 4. DETAILED METRICS SHEET -->
  <g filter="url(#panelShadow)">
    <rect x="32" y="586" width="326" height="152" rx="24" fill="#1E2E38" fill-opacity="0.95"/>
  </g>
  <text x="50" y="618" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="900">Performance Metrics</text>
  
  <!-- Stat 1 -->
  <text x="50" y="648" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Today's Sales:</text>
  <text x="340" y="648" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900" text-anchor="end">₱4,745.00</text>

  <!-- Stat 2 -->
  <text x="50" y="678" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Average Order Size:</text>
  <text x="340" y="678" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900" text-anchor="end">₱112.50</text>

  <!-- Stat 3 -->
  <text x="50" y="708" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Popular Dish:</text>
  <text x="340" y="708" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="900" text-anchor="end">Chicken Adobo Meal</text>


  <!-- 5. BOTTOM NAVIGATION BAR (Analytics Highlighted in purple, Orders, Menu) -->
  <path d="M0 754H390V844H0V754Z" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Tab 1: Orders (grey receipts list) -->
  <g transform="translate(62, 776)" fill="#94A3B8">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
  </g>

  <!-- Tab 2: Menu (grey utensils) -->
  <g transform="translate(180, 776)" fill="#94A3B8">
    <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V19h2.5v-7.03C11.34 11.84 13 10.12 13 8V2h-2v7zm4-3v5h1.5v8h2v-8H20V2c-2.76 0-5 2.24-5 4z"/>
  </g>

  <!-- Tab 3: Analytics (Selected Active Purple Pill) -->
  <g transform="translate(256, 768)">
    <rect x="0" y="0" width="102" height="38" rx="19" fill="#5562EA"/>
    <!-- Analytics Icon -->
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-5h2v5zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z" fill="#FFFFFF" transform="translate(12, 6) Scale(0.9)"/>
    <text x="64" y="24" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="900">Analytics</text>
  </g>
</svg>
